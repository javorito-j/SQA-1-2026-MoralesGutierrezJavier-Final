services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: panda_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env.docker
    environment:
      TZ: America/La_Paz
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - panda_network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: panda_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - panda_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: panda_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: America/La_Paz
    ports:
      - "3307:3306"
    volumes:
      - panda_mysql_data:/var/lib/mysql
    networks:
      - panda_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  panda_mysql_data:

networks:
  panda_network:
    driver: bridge
